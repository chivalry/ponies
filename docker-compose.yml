version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ponyuser
      POSTGRES_PASSWORD: ponypass
      POSTGRES_DB: ponies
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build: ./docker/backend
    command: flask run --host=0.0.0.0
    volumes:
      - ./backend:/app
    environment:
      FLASK_APP: app
      FLASK_ENV: development
      DATABASE_URL: postgresql://ponyuser:ponypass@db:5432/ponies
    ports:
      - "5000:5000"
    depends_on:
      - db
  frontend:
    build: ./docker/frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  db_data:
